_min_copier_version: "9.0"
_subdirectory: template
_templates_suffix: .jinja
_answers_file: .copier-answers.yml

_angee:
  schema: 1
  kind: agent
  name: angee-developer
  description: Developer agent with its own copy of the code source.

agent_name:
  type: str
  default: angee-developer

source_kind:
  type: str
  default: github

source_repo:
  type: str
  default: fyltr/angee-notes

source_ref:
  type: str
  default: same-name

source_tree:
  type: str
  default: .

code_target:
  type: str
  default: code

provider:
  type: str
  default: anthropic

model:
  type: str
  default: claude-sonnet-4-5
