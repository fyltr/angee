_min_copier_version: "9.0"
_subdirectory: template
_templates_suffix: .jinja
_answers_file: .copier-answers.yml

# ---------- Angee metadata: drives the elegant shorthand ----------
_angee:
  schema: 1
  kind: agent
  name: claude-angee-dev
  description: |
    Claude Code agent that develops django-angee/examples/angee-notes inside
    its own git worktree, with its own dev stack and a per-agent Playwright
    MCP server it can drive against the inner UI.

  # Tells the operator how to derive the agent NAME from input flags.
  # Pattern uses inputs.* refs and stdlib filters (slug, lower, local_part).
  instance_naming:
    pattern: "${inputs.branch | slug}"
    fallback: "${inputs.name}"          # honored if --name is passed explicitly
    max_length: 40

  # Declarative input schema. CLI flags and HTTP/MCP `inputs:` map through
  # `maps_to` paths into Copier answers and angee.yaml fragments.
  inputs:
    branch:
      type: str
      required: true
      cli_flag: --branch
      maps_to:
        copier: branch
        angee:  agents.${name}.workspace.sources.code.branch

    base_branch:
      type: str
      default: dev
      cli_flag: --base-branch
      maps_to:
        copier: base_branch
        angee:  agents.${name}.workspace.sources.code.ref

    repo:
      type: str
      default: ../django-angee
      cli_flag: --repo
      maps_to:
        copier: repo_path
        angee:  agents.${name}.workspace.sources.code.repo

    app_subpath:
      type: str
      default: examples/angee-notes
      cli_flag: --app
      maps_to:
        copier: app_subpath

    model:
      type: str
      default: claude-sonnet-4-5
      cli_flag: --model
      maps_to:
        copier: model

  # Inputs the operator should resolve before rendering.
  resolves:
    ports:                              # auto-allocated from operator pool
      - { name: django,     pool: django }
      - { name: ui,         pool: ui }
      - { name: playwright, pool: custom }
    secrets:                            # inherited from parent stack backend
      - anthropic-api-key
    sources:
      code:
        kind: git
        mode: worktree                  # uses `git worktree add`
        worktree_root: "${parent.worktree_root | default('../django-angee.workspaces')}"

  # Template chaining: the chained stack the agent develops against.
  # See OVERVIEW-v2 "Template Chaining". Uses the same operator process; ports
  # come from the operator's pool via ${alloc.*}.
  chain:
    - kind: stack
      template: stacks/angee-notes-dev
      workdir: "${workspace.code_path}/${inputs.app_subpath}"
      inputs:
        project_name: "angee-notes-${name}"
        ANGEE_ROOT: .angee
        app_path: .
        django_port: "${ports.django}"
        ui_port:    "${ports.ui}"
      lifecycle:
        provision_on: agent.init
        up_on:        agent.start
        down_on:      agent.stop
        destroy_on:   agent.destroy

  # MCP servers wired into the agent's .mcp.json by the operator.
  mcp_servers:
    - filesystem            # built-in; scoped to the worktree
    - operator              # operator URL; host rewritten per agent location
    - playwright            # per-agent local process; data dir via persist:
    - inner-django          # ${service.web}/mcp from the chained stack

# ---------- Copier questions (mostly populated via _angee.inputs) ----------
agent_name:
  type: str
  default: dev
  help: Internal slot. The operator overwrites this with the resolved instance name.

branch:
  type: str
  default: feat/angee-developer

base_branch:
  type: str
  default: dev

repo_path:
  type: str
  default: ../django-angee

app_subpath:
  type: str
  default: examples/angee-notes

model:
  type: str
  default: claude-sonnet-4-5

provider:
  type: str
  default: anthropic
