_min_copier_version: "9.0"
_subdirectory: template
_templates_suffix: .jinja
_answers_file: .copier-answers.yml

_angee:
  schema: 1
  kind: workspace
  name: pr
  description: |
    Developer workspace for a pull-request branch. The operator renders this
    directory, materializes the code source as a git worktree, then optionally
    provisions the angee-notes dev stack inside the worktree.

  instance_naming:
    pattern: "${inputs.branch | slug}"
    fallback: "${inputs.name}"
    max_length: 40

  inputs:
    branch:
      type: str
      required: true
      maps_to: { copier: branch }
    base_branch:
      type: str
      default: dev
      maps_to: { copier: base_branch }
    app_subpath:
      type: str
      default: examples/angee-notes
      maps_to: { copier: app_subpath }

  sources:
    code:
      source: django-angee
      mode: worktree
      ref: "${inputs.base_branch}"
      branch: "${inputs.branch}"
      subpath: code
    skills:
      source: runner-skills
      mode: clone
      ref: main
      subpath: skills
      optional: true

  chain_root: code/${inputs.app_subpath}/.angee
  chain:
    - template: stacks/angee-notes-dev
      workdir: code/${inputs.app_subpath}
      root: code/${inputs.app_subpath}/.angee
      inputs:
        project_name: "angee-notes-${name}"
        ANGEE_ROOT: .angee
        app_path: .
        django_port: "${alloc.web}"
        ui_port: "${alloc.web}"
        operator_port: "${alloc.custom}"

  persist:
    browser-data: { subpath: .browser-data, scope: workspace }

workspace_name:
  type: str
  default: dev
  help: Internal slot. The operator overwrites this with the resolved workspace name.

branch:
  type: str
  default: feat/example

base_branch:
  type: str
  default: dev

app_subpath:
  type: str
  default: examples/angee-notes
