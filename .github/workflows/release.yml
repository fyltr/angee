name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  OPERATOR_IMAGE: ghcr.io/fyltr/angee-operator
  CLI_IMAGE: ghcr.io/fyltr/angee-cli
  GO_VERSION: "1.25"

permissions:
  contents: read

jobs:
  # Re-run the full test matrix before cutting a release.
  verify:
    name: verify (test + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt would reformat:"
            echo "$unformatted"
            exit 1
          fi

      - name: vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1
          args: --timeout=5m

      - name: test
        run: go test -race ./...

  release-binaries:
    name: build release binaries
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build CLI + operator
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
        run: |
          set -e
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then EXT=".exe"; fi

          mkdir -p dist
          LDFLAGS="-s -w -X github.com/fyltr/angee/cli.Version=${VERSION}"

          go build -trimpath -ldflags="${LDFLAGS}" \
            -o "dist/angee${EXT}" \
            ./cmd/angee
          go build -trimpath -ldflags="${LDFLAGS}" \
            -o "dist/angee-operator${EXT}" \
            ./cmd/operator

          # Bundle: tar.gz on unix, zip on windows
          cd dist
          if [ "${{ matrix.os }}" = "windows" ]; then
            zip "angee-${{ matrix.os }}-${{ matrix.arch }}.zip" "angee${EXT}" "angee-operator${EXT}"
          else
            tar -czf "angee-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" "angee${EXT}" "angee-operator${EXT}"
          fi
          # Drop the loose binaries — only ship the bundle.
          rm -f "angee${EXT}" "angee-operator${EXT}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  create-release:
    name: create GitHub release
    runs-on: ubuntu-latest
    needs: release-binaries
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: binaries-*
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz *.zip 2>/dev/null > SHA256SUMS || true
          cat SHA256SUMS

      - name: Create GitHub Release & upload assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/SHA256SUMS
          generate_release_notes: true

  release-docker:
    name: build & push docker images
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract operator metadata
        id: meta-operator
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.OPERATOR_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build & push operator image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.operator
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-operator.outputs.tags }}
          labels: ${{ steps.meta-operator.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract CLI metadata
        id: meta-cli
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.CLI_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build & push CLI image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.cli
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-cli.outputs.tags }}
          labels: ${{ steps.meta-cli.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-install-script:
    name: publish install script
    runs-on: ubuntu-latest
    needs: [create-release, release-docker]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Pin install script to this version
        run: |
          VERSION="${{ github.ref_name }}"
          sed -i.bak "s/^ANGEE_VERSION=.*/ANGEE_VERSION=${VERSION}/" scripts/install.sh
          rm -f scripts/install.sh.bak

      - name: Upload install script to release
        uses: softprops/action-gh-release@v3
        with:
          files: scripts/install.sh
