name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel superseded runs on the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25"

permissions:
  contents: read

jobs:
  # ── Stage 1: cheap static checks (fail fast) ─────────────────────────
  static:
    name: gofmt + vet + tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt would reformat the following files:"
            echo "$unformatted"
            gofmt -d .
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go mod tidy is clean
        run: |
          go mod tidy
          if ! git diff --quiet -- go.mod go.sum; then
            echo "::error::go.mod / go.sum drift after 'go mod tidy':"
            git --no-pager diff -- go.mod go.sum
            exit 1
          fi

  # ── Stage 2: golangci-lint ───────────────────────────────────────────
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    needs: static
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1
          args: --timeout=5m

  # ── Stage 3: tests on linux + macos with race detector ──────────────
  test:
    name: test (${{ matrix.os }})
    needs: static
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Test (race + coverage)
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v6
        with:
          file: coverage.out
        continue-on-error: true

  # ── Stage 4: cross-compile sanity check ─────────────────────────────
  build:
    name: build (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: [static, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build operator
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then EXT=".exe"; fi
          go build -trimpath -ldflags="-s -w" \
            -o "dist/angee-operator-${{ matrix.os }}-${{ matrix.arch }}${EXT}" \
            ./cmd/operator

      - name: Build CLI
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then EXT=".exe"; fi
          go build -trimpath -ldflags="-s -w" \
            -o "dist/angee-${{ matrix.os }}-${{ matrix.arch }}${EXT}" \
            ./cmd/angee

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/
          retention-days: 7

  # ── Stage 5: vulnerability scan (govulncheck) ────────────────────────
  vulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    needs: static
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # Run govulncheck directly instead of via golang/govulncheck-action.
      # The action conflicts with actions/setup-go's git auth ("Duplicate
      # header: Authorization") on PR runs as of v6 of setup-go.
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # ── Stage 6: Docker images (no push) ─────────────────────────────────
  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build operator image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.operator
          push: false
          tags: ghcr.io/fyltr/angee-operator:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build CLI image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.cli
          push: false
          tags: ghcr.io/fyltr/angee-cli:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
