name: angee-developer
description: "Developer agent — Claude Code for writing code, fixing bugs, running tests"

requires:
  - angee-files       # MCP server (provided by base)

agents:
  angee-developer:
    build:
      context: ./agents/angee-developer
      dockerfile: Dockerfile
    lifecycle: system
    role: user
    description: "Developer agent — Claude Code for writing code, fixing bugs, running tests"
    mcp_servers:
      - angee-files
    files:
      - template: mcp.json.tmpl
        mount: /workspace/.mcp.json
    workspace:
      persistent: true
    resources:
      cpu: "2.0"
      memory: "4Gi"
    env:
      ANTHROPIC_API_KEY: "${secret:anthropic-api-key}"

secrets:
  - name: anthropic-api-key
    description: "Anthropic API key for AI agents"
    required: true

files:
  - agents/angee-developer/AGENTS.md
  - agents/angee-developer/Dockerfile

templates:
  - mcp.json.tmpl
