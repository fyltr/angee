name: openbao
description: "OpenBao — secrets management and credential storage"

services:
  openbao:
    build:
      context: ./services/openbao
      dockerfile: Dockerfile
    lifecycle: system
    ports:
      - "8200:8200"
    command: server -dev -dev-root-token-id=dev-root-token -dev-plugin-dir=/openbao/plugins
    env:
      BAO_DEV_ROOT_TOKEN_ID: dev-root-token
    volumes:
      - name: bao-data
        path: /openbao/data
        persistent: true

# When openbao is present, the stack can use it as secrets backend.
# Add this to the top level of angee.yaml:
