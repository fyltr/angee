name: official/default
description: |
  Operator + Traefik + OpenBao + admin agent.
  The minimal Angee infrastructure base. Add application services with `angee add`.
version: "1.0"
author: angee

parameters:
  - name: ProjectName
    description: "Project name (lowercase, hyphens)"
    required: true
    validate: "^[a-z][a-z0-9-]+$"

services:
  - operator
  - traefik
  - openbao

agents:
  - angee-admin

secrets:
  - name: bao-token
    description: "OpenBao root token (dev mode)"
    required: true
    generated: true
    length: 32

  - name: anthropic-api-key
    description: "Anthropic API key for AI agents (get yours at console.anthropic.com)"
    required: true
